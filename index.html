<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noventra</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#080b14;
  color:#fff;
}

.hidden{
  display:none!important;
}

button{
  border:0;
  cursor:pointer;
  font-weight:bold;
}

/* GİRİŞ */

.auth{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.auth-box{
  width:100%;
  max-width:400px;
  background:#111827;
  padding:35px;
  border-radius:24px;
  border:1px solid #263247;
}

.logo{
  text-align:center;
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #2c3a52;
  background:#0b111d;
  color:white;
  outline:none;
}

.main-btn{
  width:100%;
  padding:15px;
  border-radius:12px;
  background:#7357ff;
  color:white;
}

.switch{
  text-align:center;
  margin-top:20px;
  color:#8995aa;
  cursor:pointer;
}

/* SAYT */

#app{
  min-height:100vh;
  padding-bottom:90px;
}

.header{
  max-width:1100px;
  margin:auto;
  padding:25px 20px 10px;
  text-align:center;
}

.header .logo{
  margin:0;
}

.nav{
  max-width:600px;
  margin:25px auto;
  display:flex;
  justify-content:space-around;
  border-bottom:1px solid #263247;
}

.nav button{
  background:none;
  color:#8995aa;
  padding:15px 20px;
  font-size:15px;
}

.nav button.active{
  color:white;
  border-bottom:2px solid #7357ff;
}

.content{
  max-width:1100px;
  margin:auto;
  padding:0 20px;
}

.welcome{
  margin:30px 0;
}

.welcome h1{
  font-size:32px;
  margin-bottom:8px;
}

.welcome p{
  color:#8995aa;
}

/* KARTLAR */

.stats{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);
  gap:18px;
}

.card{
  background:#111827;
  border:1px solid #263247;
  border-radius:20px;
  padding:24px;
}

.label{
  color:#8995aa;
  font-size:14px;
}

.value{
  font-size:28px;
  font-weight:bold;
  margin-top:12px;
}

.green{
  color:#40dc91;
}

.purple{
  color:#9d87ff;
}

/* ANA SƏHİFƏ */

.main-panel{
  margin-top:22px;
  display:grid;
  grid-template-columns:
  1.4fr 1fr;
  gap:18px;
}

.activity{
  min-height:250px;
}

.activity h2,
.card h2{
  margin-top:0;
}

.task{
  margin-top:20px;
  padding:18px;
  background:#0b111d;
  border-radius:15px;
  border:1px solid #263247;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.task button{
  background:#7357ff;
  color:white;
  padding:11px 16px;
  border-radius:10px;
}

/* QAZANC */

.earning-box{
  display:grid;
  grid-template-columns:
  1fr 1fr;
  gap:18px;
}

.earning-row{
  display:flex;
  justify-content:space-between;
  padding:18px 0;
  border-bottom:1px solid #263247;
}

.muted{
  color:#8995aa;
}

/* HESAB */

.account{
  max-width:700px;
}

.account-row{
  display:flex;
  justify-content:space-between;
  padding:18px 0;
  border-bottom:1px solid #263247;
}

.logout{
  margin-top:25px;
  padding:14px 20px;
  border-radius:10px;
  background:#252e40;
  color:white;
}

/* MOBİL */

@media(max-width:700px){

  .stats{
    grid-template-columns:1fr;
  }

  .main-panel{
    grid-template-columns:1fr;
  }

  .earning-box{
    grid-template-columns:1fr;
  }

  .welcome h1{
    font-size:25px;
  }

  .nav button{
    padding:14px 8px;
    font-size:13px;
  }

}
</style>
</head>

<body>


<!-- GİRİŞ -->

<section id="loginPage" class="auth">

  <div class="auth-box">

    <div class="logo">
      NOVENTRA
    </div>

    <input
      id="loginEmail"
      type="email"
      placeholder="Email">

    <input
      id="loginPassword"
      type="password"
      placeholder="Şifrə">

    <button
      class="main-btn"
      onclick="login()">

      Daxil ol

    </button>

    <div
      class="switch"
      onclick="showRegister()">

      Hesab yarat

    </div>

  </div>

</section>


<!-- QEYDİYYAT -->

<section
  id="registerPage"
  class="auth hidden">

  <div class="auth-box">

    <div class="logo">
      NOVENTRA
    </div>

    <input
      id="registerEmail"
      type="email"
      placeholder="Email">

    <input
      id="registerPassword"
      type="password"
      placeholder="Şifrə">

    <button
      class="main-btn"
      onclick="register()">

      Qeydiyyatdan keç

    </button>

    <div
      class="switch"
      onclick="showLogin()">

      Girişə qayıt

    </div>

  </div>

</section>


<!-- ƏSAS SİSTEM -->

<section
  id="app"
  class="hidden">


  <header class="header">

    <div class="logo">
      NOVENTRA
    </div>


    <nav class="nav">

      <button
        id="homeBtn"
        class="active"
        onclick="openPage('home')">

        Ana səhifə

      </button>


      <button
        id="earnBtn"
        onclick="openPage('earnings')">

        Qazanc

      </button>


      <button
        id="accountBtn"
        onclick="openPage('account')">

        Hesabım

      </button>

    </nav>

  </header>


  <main class="content">


    <!-- ANA SƏHİFƏ -->

    <div
      id="homePage">


      <div class="welcome">

        <h1>
          Xoş gəlmisiniz
        </h1>

        <p>
          Hesabınızın ümumi vəziyyəti
        </p>

      </div>


      <div class="stats">


        <div class="card">

          <div class="label">
            Aktiv balans
          </div>

          <div class="value">
            0.00 AZN
          </div>

        </div>


        <div class="card">

          <div class="label">
            Bugünkü qazanc
          </div>

          <div
            class="value green">

            2.00 AZN

          </div>

        </div>


        <div class="card">

          <div class="label">
            Cari mərhələ
          </div>

          <div
            class="value purple">

            1 / 4

          </div>

        </div>


      </div>


      <div class="main-panel">


        <div class="card activity">

          <h2>
            Bugünkü fəaliyyət
          </h2>

          <p class="muted">
            Günün fəaliyyətini buradan idarə edə
