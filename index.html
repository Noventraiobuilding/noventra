<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noventra</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:#07111f;
color:white;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 7%;
border-bottom:1px solid #26384c;
}
.logo{
font-size:24px;
font-weight:bold;
letter-spacing:4px;
}
button{
border:0;
cursor:pointer;
padding:13px 20px;
border-radius:8px;
font-weight:bold;
}
.login{
background:transparent;
color:white;
border:1px solid #526579;
margin-right:8px;
}
.register{
background:#7dd3fc;
color:#07111f;
}
.hero{
padding:100px 7%;
min-height:500px;
display:flex;
align-items:center;
}
.content{
max-width:750px;
}
.tag{
color:#7dd3fc;
letter-spacing:4px;
font-size:13px;
margin-bottom:20px;
}
h1{
font-size:60px;
line-height:1.05;
margin:0 0 25px;
}
p{
color:#a6b5c5;
font-size:18px;
line-height:1.6;
}
.main-button{
margin-top:25px;
background:#7dd3fc;
color:#07111f;
font-size:16px;
}
.modal{
display:none;
position:fixed;
z-index:10;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
align-items:center;
justify-content:center;
padding:20px;
}
.modal-box{
background:#102033;
width:100%;
max-width:400px;
padding:30px;
border-radius:16px;
}
.modal-box h2{
margin-top:0;
}
.close{
float:right;
font-size:28px;
cursor:pointer;
}
input{
display:block;
width:100%;
padding:14px;
margin:12px 0;
border-radius:8px;
border:1px solid #40566d;
background:#07111f;
color:white;
font-size:16px;
}
.form-button{
width:100%;
background:#7dd3fc;
color:#07111f;
margin-top:8px;
}
.message{
margin-top:15px;
font-size:14px;
color:#7dd3fc;
}
@media(max-width:600px){
h1{font-size:42px}
header{padding:18px 5%}
.logo{font-size:18px}
}
</style>
</head>

<body>

<header>
<div class="logo">NOVENTRA</div>

<div>
<button class="login" onclick="openLogin()">Daxil ol</button>
<button class="register" onclick="openRegister()">Qeydiyyat</button>
</div>
</header>

<section class="hero">
<div class="content">

<div class="tag">NOVENTRA PLATFORM</div>

<h1>Müasir bazar strategiyaları platforması.</h1>

<p>
Noventra müasir bazar strategiyalarını və rəqəmsal imkanları bir platformada birləşdirir.
</p>

<button class="main-button" onclick="openRegister()">
Platformaya qoşul
</button>

</div>
</section>

<div id="registerModal" class="modal">

<div class="modal-box">

<span class="close" onclick="closeRegister()">×</span>

<h2>Qeydiyyat</h2>

<input id="registerEmail" type="email" placeholder="E-poçt ünvanı">

<input id="registerPassword" type="password" placeholder="Şifrə">

<button class="form-button" onclick="registerUser()">
Qeydiyyatdan keç
</button>

<div id="registerMessage" class="message"></div>

</div>

</div>

<div id="loginModal" class="modal">

<div class="modal-box">

<span class="close" onclick="closeLogin()">×</span>

<h2>Daxil ol</h2>

<input id="loginEmail" type="email" placeholder="E-poçt ünvanı">

<input id="loginPassword" type="password" placeholder="Şifrə">

<button class="form-button" onclick="loginUser()">
Daxil ol
</button>

<div id="loginMessage" class="message"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
"https://yafncpfkjmealuwmvcgc.supabase.co";

const supabaseKey =
"sb_publishable_4uogckOVNwIrH72gbNlSxg_ywvZ1BE1";

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

function openRegister(){
document.getElementById("registerModal").style.display="flex";
}

function closeRegister(){
document.getElementById("registerModal").style.display="none";
}

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}

async function registerUser(){

const email =
document.getElementById("registerEmail").value;

const password =
document.getElementById("registerPassword").value;

if(!email || !password){

document.getElementById("registerMessage").innerText =
"E-poçt və şifrəni yaz.";

return;
}

const result =
await client.auth.signUp({
email:email,
password:password
});

if(result.error){

document.getElementById("registerMessage").innerText =
result.error.message;

}else{

document.getElementById("registerMessage").innerText =
"Qeydiyyat uğurludur. E-poçtunu yoxla.";

}

}

async function loginUser(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

if(!email || !password){

document.getElementById("loginMessage").innerText =
"E-poçt və şifrəni yaz.";

return;
}

const result =
await client.auth.signInWithPassword({
email:email,
password:password
});

if(result.error){

document.getElementById("loginMessage").innerText =
result.error.message;

}else{

document.getElementById("loginMessage").innerText =
"Daxil oldunuz!";

}

}

</script>

</body>
</html>
